---
applications:
- name: pal-tracker
  path: build/libs/pal-tracker.jar
  stack: cflinuxfs3
  buildpacks:
  - java_buildpack_offline
  random-route: true
  instances: 2
  memory: 1G
  disk: 1G
  env:
    WELCOME_MESSAGE: Hello from Cloud Foundry
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 11.+ } }'
